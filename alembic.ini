# Alembic 配置（项目根）
# 迁移脚本目录：backend/migrations
# 数据库 URL 由 env.py 从 app.config 读取，这里留空即可。

[alembic]
script_location = backend/migrations
prepend_sys_path = backend
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

# ---------- 日志 ----------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
